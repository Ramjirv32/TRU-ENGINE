<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Rwanda Program Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { display: none; }
        .loading.show { display: inline-block; }
        .results { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
                University of Rwanda Program Search
            </h1>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    College Name:
                </label>
                <input 
                    type="text" 
                    id="collegeName" 
                    value="University of Rwanda"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter college name"
                >
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Search Type:
                </label>
                <select 
                    id="searchType"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="ug">Undergraduate Programs</option>
                    <option value="pg">Master's & Postgraduate Programs</option>
                    <option value="phd">PhD Programs</option>
                    <option value="departments">Academic Departments</option>
                </select>
            </div>

            <button 
                id="searchBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-medium"
            >
                Search Programs
            </button>

            <div id="loading" class="loading mt-4 text-center">
                <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
                <span class="ml-2">Searching...</span>
            </div>

            <div id="results" class="mt-6 hidden">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xl font-semibold text-gray-800">Results:</h2>
                    <div class="flex gap-4 text-sm">
                        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
                            ⏱️ Time: <span id="searchTime">0.00</s> seconds
                        </span>
                        <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full">
                            📊 Total Programs: <span id="programCount">0</span>
                        </span>
                    </div>
                </div>
                <div class="results bg-gray-50 rounded-lg p-4">
                    <pre id="resultsContent" class="text-sm text-gray-700 whitespace-pre-wrap"></pre>
                </div>
                <button 
                    id="copyBtn"
                    class="mt-3 bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition duration-200 text-sm"
                >
                    Copy Results
                </button>
            </div>

            <div id="error" class="mt-4 hidden">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-red-700" id="errorMessage"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyC2hDuV-AqxX9zsAD7KmSEQ8BhB311euYs";
        
        const PROMPTS = {
            ug: "List all official undergraduate degree programs (Bachelor's degrees) currently offered at the University of Rwanda (UR) across all its colleges for the 2025/2026 academic year. You MUST use their exact, official titles (e.g., 'Bachelor of Science with Honours in Civil Engineering'). Do NOT list individual class modules. Return the result ONLY as a flat JSON array of strings containing the full program names.",
            pg: "List all official Master's degree programs and Postgraduate Diplomas (PGD) currently offered at the University of Rwanda (UR) across all its colleges and African Centers of Excellence (ACEs) for the 2025/2026 academic year. You MUST use their exact, official titles (e.g., 'Master of Science in Data Science', 'Master of Medicine in Internal Medicine'). Do NOT include PhDs or generic class modules. Return the result ONLY as a flat JSON array of strings.",
            phd: "List all official PhD programs currently offered at the University of Rwanda (UR) and its African Centers of Excellence (ACEs) for the 2025/2026 academic year. You MUST use their exact, official titles (e.g., 'PhD in Data Science', 'PhD in Renewable Energy'). Do NOT invent generic PhD titles like 'PhD in Physical Sciences' unless it is an exact official program name. Return the result ONLY as a flat JSON array of strings.",
            departments: "List all official academic Departments across all six colleges (CASS, CAVM, CBE, CE, CMHS, CST) at the University of Rwanda (UR). You MUST use their exact, official administrative titles (e.g., 'Department of Computer and Software Engineering', 'Department of Clinical Psychology'). Do not list degree programs or colleges, only the specific departments. Return the result ONLY as a flat JSON array of strings."
        };

        async function searchPrograms() {
            const collegeName = document.getElementById('collegeName').value;
            const searchType = document.getElementById('searchType').value;
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');
            const resultsContent = document.getElementById('resultsContent');
            const errorMessage = document.getElementById('errorMessage');
            const searchTimeSpan = document.getElementById('searchTime');
            const programCountSpan = document.getElementById('programCount');

            // Hide previous results
            results.classList.add('hidden');
            error.classList.add('hidden');
            loading.classList.add('show');

            // Start timer
            const startTime = performance.now();

            try {
                const prompt = PROMPTS[searchType];
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            response_mime_type: 'application/json',
                            temperature: 0.1
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const content = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!content) {
                    throw new Error('No content received from API');
                }

                // Calculate elapsed time
                const endTime = performance.now();
                const elapsedTime = ((endTime - startTime) / 1000).toFixed(2);
                searchTimeSpan.textContent = elapsedTime;

                // Try to parse as JSON and count programs
                let programCount = 0;
                try {
                    const parsed = JSON.parse(content);
                    if (Array.isArray(parsed)) {
                        programCount = parsed.length;
                    }
                    resultsContent.textContent = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    // If not valid JSON, show as is and count lines that look like programs
                    resultsContent.textContent = content;
                    const lines = content.split('\n').filter(line => line.trim() && !line.startsWith('[') && !line.startsWith(']'));
                    programCount = lines.length;
                }

                programCountSpan.textContent = programCount;
                results.classList.remove('hidden');
                
            } catch (err) {
                errorMessage.textContent = `Error: ${err.message}`;
                error.classList.remove('hidden');
            } finally {
                loading.classList.remove('show');
            }
        }

        function copyResults() {
            const resultsContent = document.getElementById('resultsContent');
            navigator.clipboard.writeText(resultsContent.textContent).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', searchPrograms);
        document.getElementById('copyBtn').addEventListener('click', copyResults);

        // Allow Enter key to search
        document.getElementById('collegeName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPrograms();
        });
    </script>
</body>
</html>
