<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Intelligence | Global Academic Insights</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    
    <!-- Internal Styles (Embedded for Server Compatibility) -->
    <style>
        :root {
            --primary: #9a3197;
            --primary-light: #fef1fb;
            --secondary: #070642;
            --secondary-light: #eef2ff;
            --accent: #e084cd;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1a202c;
            --text-white: #ffffff;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-in { animation: slideInRight 0.6s ease-out forwards; }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero {
            background: linear-gradient(135deg, var(--secondary) 0%, #0b0a5c 100%);
            padding: 80px 5% 120px;
            color: var(--text-white);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 70%;
            height: 150%;
            background: radial-gradient(circle, rgba(154, 49, 151, 0.15) 0%, transparent 70%);
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239a3197' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
            pointer-events: none;
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
        }

        @media (max-width: 968px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .chart-preview-container {
                display: none;
            }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 10px;
            max-width: 700px;
            box-shadow: var(--shadow-xl);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
        }

        .search-container input:focus {
            outline: none;
        }

        .search-container input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-search:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(154, 49, 151, 0.4);
        }

        .chart-preview-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: var(--shadow-2xl);
        }

        .chart-preview-container h3 {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-wrapper {
            max-width: 1200px;
            margin: -60px auto 60px;
            padding: 0 5%;
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .example-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .example-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow-xl);
        }

        .example-card .icon {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .example-card h4 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .example-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .results-header {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border: 1px solid var(--border-color);
        }

        .college-title h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .location-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mini-stat {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .mini-stat .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .mini-stat .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .tabs-nav {
            display: flex;
            background: white;
            border-radius: 16px;
            padding: 6px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
            gap: 5px;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--secondary);
            background: var(--bg-main);
        }

        .tab-btn.active {
            background: var(--secondary);
            color: white;
        }

        .tab-panel {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            min-height: 400px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        .premium-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .premium-table th {
            text-align: left;
            padding: 15px 20px;
            background: var(--bg-main);
            color: var(--secondary);
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border-color);
        }

        .premium-table td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
        }

        .premium-table tr:last-child td {
            border-bottom: none;
        }

        .premium-table tr:hover td {
            background: var(--primary-light);
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-primary { background: var(--primary-light); color: var(--primary); }

        .custom-pie-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            pointer-events: none;
            z-index: 1000;
            min-width: 180px;
            display: none;
        }

        .tooltip-title { font-weight: 800; color: var(--secondary); margin-bottom: 5px; }
        .tooltip-value { font-size: 1.2rem; font-weight: 800; color: var(--primary); }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 6, 66, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: rotate 1s linear infinite;
            margin-bottom: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .info-card {
            background: var(--bg-main);
            padding: 20px;
            border-radius: 16px;
            border-left: 5px solid var(--primary);
        }

        .info-card h5 {
            color: var(--secondary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .info-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
    
    <!-- React & Chart.js -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        /* Embedded critical styles for no-js or initial load */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #070642;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Main React Application -->
    <script type="text/babel" data-presets="react,env">
        // Safety check for React
        if (typeof React === 'undefined') {
            console.error('React failed to load from CDN. Please refresh.');
            document.body.innerHTML = '<div style="color: white; text-align: center; margin-top: 50px;"><h1>Critical Error</h1><p>React failed to load. Please check your internet connection or refresh the page.</p></div>';
            throw new Error('React not loaded');
        }


        const { useState, useEffect, useRef } = React;
        // Custom Hook for Chart.js
        const useChart = (config) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current && config) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    chartInstance.current = new Chart(chartRef.current, config);
                }
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [config]);

            return chartRef;
        };

        const App = () => {
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(false);
            const [collegeData, setCollegeData] = useState(null);
            const [error, setError] = useState('');
            const [activeTab, setActiveTab] = useState('overview');
            const initialChartRef = useRef(null);
            const initialChartInstance = useRef(null);

            useEffect(() => {
                document.querySelector('.loading-screen')?.remove();
                initInitialChart();
            }, []);

            const initInitialChart = () => {
                const ctx = document.getElementById('initialPieChart');
                if (!ctx) return;
                
                if (initialChartInstance.current) initialChartInstance.current.destroy();

                initialChartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['UG Students', 'PG Students', 'Total Enrollment', 'Female Ratio', 'Faculty Count'],
                        datasets: [{
                            data: [450, 280, 730, 48, 120],
                            backgroundColor: [
                                'rgba(154, 49, 151, 0.8)',
                                'rgba(224, 132, 205, 0.8)',
                                'rgba(11, 10, 92, 0.8)',
                                'rgba(74, 222, 128, 0.8)',
                                'rgba(251, 191, 36, 0.8)'
                            ],
                            borderColor: 'transparent',
                            hoverOffset: 15,
                            borderRadius: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '65%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: 'rgba(255, 255, 255, 0.8)',
                                    font: { family: 'Plus Jakarta Sans', size: 10, weight: '600' },
                                    padding: 10,
                                    usePointStyle: true
                                }
                            }
                        }
                    }
                });
            };

            useEffect(() => {
                if (collegeData) {
                    if (activeTab === 'overview') {
                        setTimeout(() => {
                            initCollegePieChart();
                            initCollegeGenderChart();
                        }, 500);
                    } else if (activeTab === 'placements') {
                        setTimeout(() => {
                            initPlacementCharts();
                        }, 100);
                    } else if (activeTab === 'fees') {
                        setTimeout(() => {
                            initFeeCharts();
                        }, 100);
                    }
                }
            }, [collegeData, activeTab]);

            const initPlacementCharts = () => {
                const salaryCtx = (document.getElementById('placementSalaryChart'))?.getContext('2d');
                const trendCtx = (document.getElementById('placementTrendChart'))?.getContext('2d');
                if (!collegeData || !collegeData.placements || !salaryCtx) return;

                const p = collegeData.placements || {};
                const stats = p.placements || {};
                const comp = p.placement_comparison_last_3_years || [];

                try {
                    new Chart(salaryCtx, {
                        type: 'bar',
                        data: {
                            labels: ['Highest', 'Average', 'Median'],
                            datasets: [{
                                label: 'Package (LPA)',
                                data: [
                                    parseFloat(stats.highest_package) || 0,
                                    parseFloat(stats.average_package) || 0,
                                    parseFloat(stats.median_package) || 0
                                ],
                                backgroundColor: ['#10b981', '#3b82f6', '#f59e0b'],
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true, title: { display: true, text: 'LPA' } } }
                        }
                    });

                    if (trendCtx && comp.length > 0) {
                        const sortedComp = [...comp].sort((a, b) => a.year - b.year);
                        new Chart(trendCtx, {
                            type: 'line',
                            data: {
                                labels: sortedComp.map(c => c.year),
                                datasets: [{
                                    label: 'Avg Package (LPA)',
                                    data: sortedComp.map(c => parseFloat(c.average_package) || 0),
                                    borderColor: '#9a3197',
                                    backgroundColor: 'rgba(154, 49, 151, 0.1)',
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 5,
                                    pointBackgroundColor: '#9a3197'
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { position: 'bottom' } },
                                scales: { y: { beginAtZero: true } }
                            }
                        });
                    }
                } catch(e) { console.error(e); }
            };

            const initFeeCharts = () => {
                const distCtx = (document.getElementById('feeDistributionChart'))?.getContext('2d');
                const trendCtx = (document.getElementById('feeTrendChart'))?.getContext('2d');
                if (!collegeData || !collegeData.fees || !distCtx) return;

                const f = collegeData.fees || {};
                const fees = f.fees || {};
                const feeByYear = f.fees_by_year || [];

                try {
                    new Chart(distCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['UG Yearly', 'PG Yearly', 'Hostel Yearly'],
                            datasets: [{
                                data: [
                                    parseFloat(fees.UG?.per_year) || 0,
                                    parseFloat(fees.PG?.per_year) || 0,
                                    parseFloat(fees.hostel_per_year) || 0
                                ],
                                backgroundColor: ['#9a3197', '#0b0a5c', '#e084cd'],
                                hoverOffset: 15
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom' } }
                        }
                    });

                    if (trendCtx && feeByYear.length > 0) {
                        const ugData = feeByYear.filter(f => f.program_type === 'UG').sort((a,b) => a.year - b.year);
                        const pgData = feeByYear.filter(f => f.program_type === 'PG').sort((a,b) => a.year - b.year);
                        const years = Array.from(new Set(feeByYear.map(f => f.year))).sort();

                        new Chart(trendCtx, {
                            type: 'bar',
                            data: {
                                labels: years,
                                datasets: [
                                    {
                                        label: 'UG Fee',
                                        data: years.map(y => {
                                            const found = ugData.find(d => d.year == y);
                                            return found ? parseFloat(found.per_year_local) : 0;
                                        }),
                                        backgroundColor: '#9a3197'
                                    },
                                    {
                                        label: 'PG Fee',
                                        data: years.map(y => {
                                            const found = pgData.find(d => d.year == y);
                                            return found ? parseFloat(found.per_year_local) : 0;
                                        }),
                                        backgroundColor: '#0b0a5c'                                        
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { position: 'bottom' } },
                                scales: { y: { beginAtZero: true } }
                            }
                        });
                    }
                } catch(e) { console.error(e); }
            };

            const initCollegePieChart = () => {
                const ctx = document.getElementById('collegePieChart');
                if (!ctx || !collegeData) return;

                const stats = collegeData.basic_info?.student_statistics || {};
                const labels = [];
                const values = [];

                if (stats.ug_students > 0) { labels.push('UG Students'); values.push(stats.ug_students); }
                if (stats.pg_students > 0) { labels.push('PG Students'); values.push(stats.pg_students); }
                if (stats.phd_students > 0) { labels.push('PhD Students'); values.push(stats.phd_students); }
                if (stats.international_students > 0) { labels.push('International'); values.push(stats.international_students); }
                
                if (labels.length === 0) return;

                try {
                    new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: values,
                                backgroundColor: ['#2dd4bf', '#facc15', '#f97316', '#818cf8'],
                                hoverOffset: 15
                            }]
                        },
                        options: { 
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }

                                            <div style={{ textAlign: 'right' }}>
                                                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>HOSTEL / MESS</div>
                                                <div style={{ fontSize: '1.4rem', fontWeight: 800 }}>{formatVal(fees.hostel_per_year, 'INR')}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="info-card" style={{ marginBottom: '20px' }}>
                                    <h5>Yearly Fee Structure (Detailed)</h5>
                                    <div style={{ marginTop: '10px' }}>
                                        {feeByYear.map((item, i) => (
                                            <div key={i} style={{ padding: '12px', background: '#f8fafc', borderRadius: '10px', marginBottom: '10px', fontSize: '0.85rem' }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 700 }}>
                                                    <span>{item.program_type} - {item.year}</span>
                                                    <span>{formatVal(item.per_year_local, 'INR')}</span>
                                                </div>
                                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '4px' }}>
                                                    Total Course Estimate: {formatVal(item.total_course_local, 'INR')}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="info-card">
                                    <h5>Academic Notes</h5>
                                    <p style={{ fontSize: '0.85rem', lineHeight: '1.6' }}>{f.fees_note}</p>
                                </div>
                            </div>
                            <div>
                                <h5>Scholarships & Financial Aid</h5>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginTop: '15px' }}>
                                    {scholarships.length > 0 ? scholarships.map((s, i) => (
                                        <div key={i} style={{ padding: '15px', background: 'white', borderRadius: '12px', boxShadow: '0 4px 15px rgba(0,0,0,0.05)', borderLeft: '4px solid var(--accent)' }}>
                                            <div style={{ fontWeight: 700, fontSize: '0.9rem' }}>{s.name}</div>
                                            <div style={{ fontSize: '0.8rem', marginTop: '5px' }}>{s.eligibility}</div>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '8px' }}>Provider: {s.provider}</div>
                                        </div>
                                    )) : <div className="info-card">No specific scholarship data found.</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderInfrastructure = () => {
                const infra = collegeData.infrastructure || {};
                const items = Array.isArray(infra.infrastructure) ? infra.infrastructure : [];
                const hostel = infra.hostel_details || {};
                const library = infra.library_details || {};
                
                if (Object.keys(infra).length === 0) return <div style={{ textAlign: 'center', padding: '100px 0' }}><div className="spinner" style={{ margin: '0 auto 20px' }}></div><p>Mapping campus infrastructure...</p></div>;
                if (infra.error) return <div className="info-card" style={{ borderLeftColor: 'var(--danger)' }}><h5>Formatting Note</h5><p>Infrastructure details are being cleaned for better clarity. We found: {infra.infrastructure?.length || 0} facilities.</p></div>;

                return (
                    <div className="animate-fade-in">
                        <div className="grid-2">
                            <div>
                                <h5>Campus Facilities</h5>
                                <div className="card-grid" style={{ gridTemplateColumns: '1fr', gap: '15px', marginTop: '15px' }}>
                                    {items.length > 0 ? items.map((item, i) => (
                                        <div key={i} className="info-card">
                                            <div style={{ fontWeight: 800 }}>{item.facility}</div>
                                            <p>{item.details}</p>
                                        </div>
                                    )) : 'N/A'}
                                </div>
                            </div>
                            <div>
                                <div className="info-card" style={{ marginBottom: '20px' }}>
                                    <h5>Hostel Accommodation</h5>
                                    <p>{hostel.type || 'N/A'}</p>
                                    <div style={{ marginTop: '10px', display: 'flex', gap: '20px' }}>
                                        <div>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>MALE CAPACITY</div>
                                            <div style={{ fontWeight: 700 }}>{hostel.boys_capacity || 'N/A'}</div>
                                        </div>
                                        <div>
                                            <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>FEMALE CAPACITY</div>
                                            <div style={{ fontWeight: 700 }}>{hostel.girls_capacity || 'N/A'}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="info-card" style={{ borderLeftColor: 'var(--accent)', marginBottom: '20px' }}>
                                    <h5>Library & Information Center</h5>
                                    {library.total_books && (
                                        <div style={{ marginBottom: '15px' }}>
                                            <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>TOTAL COLLECTION</span>
                                            <div style={{ fontWeight: 800, fontSize: '1.2rem' }}>{library.total_books.toLocaleString()} Volumes</div>
                                        </div>
                                    )}
                                    <p style={{ fontSize: '0.85rem', marginBottom: '15px' }}>{library.journals}</p>
                                    <div style={{ background: '#f8fafc', padding: '15px', borderRadius: '12px' }}>
                                        <h6>Electronic Resources</h6>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '10px' }}>
                                            {Array.isArray(library.e_resources) && library.e_resources.map((res, i) => (
                                                <span key={i} className="badge badge-primary" style={{ fontSize: '0.65rem' }}>{res}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                {infra.transport_details && (
                                    <div className="info-card" style={{ borderLeftColor: '#f59e0b' }}>
                                        <h5>Transport & Shuttle Service</h5>
                                        <div style={{ display: 'flex', gap: '15px', alignItems: 'center', marginBottom: '10px' }}>
                                            <div style={{ fontSize: '1.5rem' }}>🚌</div>
                                            <div>
                                                <div style={{ fontWeight: 800 }}>{infra.transport_details.buses} Regular Buses</div>
                                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>On-Campus Transit</div>
                                            </div>
                                        </div>
                                        <p style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{infra.transport_details.routes}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTabContent = () => {
                switch(activeTab) {
                    case 'overview': return renderOverview();
                    case 'programs': return renderPrograms();
                    case 'placements': return renderPlacements();
                    case 'fees': return renderFees();
                    case 'infrastructure': return renderInfrastructure();
                    default: return renderOverview();
                }
            };

            return (
                <div className="app-container">
                    {loading && (
                        <div className="loading-overlay">
                            <div className="spinner"></div>
                            <h2>Ingesting Educational Data...</h2>
                            <p>Querying globally cached records & real-time search engines</p>
                        </div>
                    )}

                    {renderInitialHero()}

                    <main className="main-wrapper">
                        {error && (
                            <div className="animate-fade-in" style={{ background: '#fee2e2', color: '#b91c1c', padding: '20px', borderRadius: '16px', border: '1px solid #f87171', marginBottom: '30px', display: 'flex', alignItems: 'center', gap: '15px' }}>
                                <span className="material-icons-round">error</span>
                                <span>{error}</span>
                            </div>
                        )}

                        {!collegeData && (
                            <div className="examples-grid">
                                <div className="example-card animate-fade-in" onClick={() => quickSearch('Udayana University')} style={{ animationDelay: '0.1s' }}>
                                    <div className="icon">🏛️</div>
                                    <h4>Udayana University</h4>
                                    <p>Premier institution in Bali, specializing in Tourism and Medicine.</p>
                                </div>
                                <div className="example-card animate-fade-in" onClick={() => quickSearch('ITS Surabaya')} style={{ animationDelay: '0.2s' }}>
                                    <div className="icon">⚙️</div>
                                    <h4>ITS Surabaya</h4>
                                    <p>Leading technology institute known for Engineering and Maritime studies.</p>
                                </div>
                                <div className="example-card animate-fade-in" onClick={() => quickSearch('University of Oxford')} style={{ animationDelay: '0.3s' }}>
                                    <div className="icon">📖</div>
                                    <h4>Oxford University</h4>
                                    <p>Global leader in Research, Humanities, and Social Sciences.</p>
                                </div>
                                <div className="example-card animate-fade-in" onClick={() => quickSearch('MIT')} style={{ animationDelay: '0.4s' }}>
                                    <div className="icon">🔬</div>
                                    <h4>MIT</h4>
                                    <p>World-class Engineering and AI research powerhouse in Cambridge.</p>
                                </div>
                            </div>
                        )}

                        {collegeData && (
                            <div className="animate-fade-in">
                                {renderCollegeHeader()}
                                {renderStatsBar()}
                                
                                <div className="tabs-nav">
                                    <button className={`tab-btn ${activeTab === 'overview' ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>
                                        Overview
                                    </button>
                                    <button className={`tab-btn ${activeTab === 'programs' ? 'active' : ''}`} onClick={() => setActiveTab('programs')}>
                                        Programs
                                    </button>
                                    <button className={`tab-btn ${activeTab === 'placements' ? 'active' : ''}`} onClick={() => setActiveTab('placements')}>
                                        Placements
                                    </button>
                                    <button className={`tab-btn ${activeTab === 'fees' ? 'active' : ''}`} onClick={() => setActiveTab('fees')}>
                                        Fees Structure
                                    </button>
                                    <button className={`tab-btn ${activeTab === 'infrastructure' ? 'active' : ''}`} onClick={() => setActiveTab('infrastructure')}>
                                        Infrastructure
                                    </button>
                                </div>
                                
                                <div className="tab-panel">
                                    {renderTabContent()}
                                </div>
                                
                                <footer style={{ marginTop: '50px', paddingTop: '30px', borderTop: '1px solid #eee', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.85rem' }}>
                                    <p>&copy; 2026 College Intelligence Platform. AI-Scraped Data. Use for informational purposes only.</p>
                                    <div style={{ marginTop: '10px' }}>
                                        <button className="btn-search" style={{ padding: '8px 20px', fontSize: '0.75rem', background: 'var(--bg-main)', color: 'var(--text-dark)', margin: '0 auto' }} onClick={() => setCollegeData(null)}>
                                            New Analytics Search
                                        </button>
                                    </div>
                                </footer>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
